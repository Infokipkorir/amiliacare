<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Amilia Care</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="logo">Amilia<span>Care</span></div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your account</p>

    <div class="role-select">
      <div class="role-btn active" onclick="selectRole(this,'employee')">
        <span>👩‍💼</span>
        <p>I'm a Worker</p>
      </div>
      <div class="role-btn" onclick="selectRole(this,'employer')">
        <span>🏠</span>
        <p>I'm an Employer</p>
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
      <a href="#" style="font-size:13px;color:var(--green);">Forgot password?</a>
    </div>

    <button class="btn-primary btn-full" onclick="handleLogin()">Sign In</button>

    <div id="login-error" style="display:none;background:#FCEBEB;border:1px solid #F09595;border-radius:8px;padding:10px 14px;font-size:13px;color:#A32D2D;margin-top:12px;text-align:center;">
      Invalid email or password. Please try again.
    </div>

    <div class="divider"><span>or</span></div>
    <div class="auth-link">Don't have an account? <a href="register.html">Create one</a></div>
    <div class="auth-link" style="margin-top:6px"><a href="admin.html" style="font-size:12px;color:var(--text-muted);">Admin Login →</a></div>
  </div>
</div>

<script>
let currentRole = 'employee';
function selectRole(el, role) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentRole = role;
}
function handleLogin() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = 'Please fill in all fields.';
    return;
  }
  // Simulate: redirect based on role
  if (currentRole === 'employee') {
    window.location.href = 'employee-dashboard.html';
  } else {
    window.location.href = 'employer-dashboard.html';
  }
}
</script>
</body>
</html>
