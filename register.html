<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account – Amilia Care</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --green: #2A9D6E;
  --green-dark: #1D7A52;
  --green-light: #E6F5EF;
  --border: #E8ECEB;
  --text: #1A2420;
  --text-muted: #6B8279;
  --bg: #F5F7F6;
  --surface: #fff;
  --red-bg: #FCEBEB;
  --red-border: #F09595;
  --red-text: #A32D2D;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(42,157,110,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(42,157,110,.06) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.auth-page { width: 100%; display: flex; align-items: center; justify-content: center; }

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.6rem 2.4rem 2rem;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 4px 32px rgba(26,36,32,.07);
}

.logo { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--text); margin-bottom:1.2rem; display:block; }
.logo span { color: var(--green); }

h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }

/* role selector */
.role-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.role-btn {
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all .18s;
  background: var(--bg);
}
.role-btn span { font-size: 24px; display: block; margin-bottom: 5px; }
.role-btn p { font-size: 13px; font-weight: 500; color: var(--text-muted); }
.role-btn.active { border-color: var(--green); background: var(--green-light); }
.role-btn.active p { color: var(--green-dark); }

/* form */
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-muted); }
.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="tel"],
.form-group input[type="password"] {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border .15s;
  background: var(--bg);
  color: var(--text);
}
.form-group input:focus { border-color: var(--green); background: var(--surface); }
.form-group input.error { border-color: var(--red-border); }

/* password strength */
.pw-strength { margin-top: 6px; display: flex; gap: 4px; }
.pw-bar { height: 3px; flex: 1; border-radius: 2px; background: var(--border); transition: background .3s; }
.pw-bar.weak   { background: #E05C5C; }
.pw-bar.medium { background: var(--amber, #E9A23B); }
.pw-bar.strong { background: var(--green); }
.pw-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.hint { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

/* checkbox */
.checkbox-group { display: flex; align-items: flex-start; gap: 10px; }
.checkbox-group input[type="checkbox"] { margin-top: 3px; accent-color: var(--green); flex-shrink: 0; width: 15px; height: 15px; }
.checkbox-group label { font-size: 13px; color: var(--text-muted); line-height: 1.4; cursor: pointer; }
.checkbox-group a { color: var(--green); text-decoration: none; }
.checkbox-group a:hover { text-decoration: underline; }

/* alert */
.alert {
  display: none;
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px;
  margin-bottom: 12px;
}
.alert.error   { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-text); }
.alert.success { background: var(--green-light); border: 1px solid #9FE1CB; color: var(--green-dark); }

/* button */
.btn-primary {
  width: 100%;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 15px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary:hover:not(:disabled) { background: var(--green-dark); }
.btn-primary:active:not(:disabled) { transform: scale(.99); }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }

.btn-spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* two column grid */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.auth-link { text-align: center; font-size: 13.5px; color: var(--text-muted); margin-top: 1rem; }
.auth-link a { color: var(--green); text-decoration: none; font-weight: 500; }
.auth-link a:hover { text-decoration: underline; }

/* success overlay */
.success-screen {
  display: none;
  text-align: center;
  padding: 1rem 0;
}
.success-icon { font-size: 52px; margin-bottom: 1rem; }
.success-screen h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.success-screen p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- REGISTRATION FORM -->
    <div id="reg-form">
      <span class="logo">Amilia<span>Care</span></span>
      <h2>Create Your Account</h2>
      <p class="subtitle">Join thousands on Amilia Care</p>

      <div class="role-select">
        <div class="role-btn active" id="btn-employee" onclick="selectRole('employee')">
          <span>👩‍💼</span>
          <p>I'm looking for work</p>
        </div>
        <div class="role-btn" id="btn-employer" onclick="selectRole('employer')">
          <span>🏠</span>
          <p>I want to hire</p>
        </div>
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="Jane Wanjiru Mwangi">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+254 7XX XXX XXX">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 8 characters" oninput="checkStrength()">
        <div class="pw-strength">
          <div class="pw-bar" id="bar1"></div>
          <div class="pw-bar" id="bar2"></div>
          <div class="pw-bar" id="bar3"></div>
          <div class="pw-bar" id="bar4"></div>
        </div>
        <div class="pw-label" id="pw-label"></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password">
      </div>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="terms">
          <label for="terms">
            I agree to the <a href="#">Terms &amp; Conditions</a> and <a href="#">Privacy Policy</a>
          </label>
        </div>
      </div>

      <div class="alert error"   id="reg-error"></div>
      <div class="alert success" id="reg-success"></div>

      <button class="btn-primary" id="reg-btn" onclick="handleRegister()">
        <span class="btn-spinner" id="btn-spinner"></span>
        <span id="btn-text">Create Account</span>
      </button>

      <div class="auth-link">Already have an account? <a href="login.html">Sign in</a></div>
    </div>

    <!-- SUCCESS SCREEN (shown after sign-up) -->
    <div class="success-screen" id="success-screen">
      <div class="success-icon">📬</div>
      <h3>Check your email!</h3>
      <p>
        We sent a confirmation link to<br>
        <strong id="success-email"></strong><br><br>
        Click the link to activate your account, then come back to sign in.
      </p>
      <br>
      <a href="login.html" class="btn-primary" style="text-decoration:none;margin-top:.5rem">Go to Login →</a>
    </div>

  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────
const SUPABASE_URL = 'https://phoahudvrcelfrykoeuo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_s4Wljr3TEtjLRxNJ9DzRSw_17gtvoAb';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── ROLE ──────────────────────────────────────────────────
let currentRole = 'employee';
function selectRole(role) {
  currentRole = role;
  document.getElementById('btn-employee').classList.toggle('active', role === 'employee');
  document.getElementById('btn-employer').classList.toggle('active', role === 'employer');
}
// Pre-fill role from URL param
const params = new URLSearchParams(window.location.search);
if (params.get('type') === 'employer') selectRole('employer');

// ── PASSWORD STRENGTH ─────────────────────────────────────
function checkStrength() {
  const pw  = document.getElementById('password').value;
  const bars = [document.getElementById('bar1'), document.getElementById('bar2'),
                document.getElementById('bar3'), document.getElementById('bar4')];
  const label = document.getElementById('pw-label');

  let score = 0;
  if (pw.length >= 8)              score++;
  if (/[A-Z]/.test(pw))           score++;
  if (/[0-9]/.test(pw))           score++;
  if (/[^A-Za-z0-9]/.test(pw))    score++;

  const classes = ['', 'weak', 'medium', 'medium', 'strong'];
  const labels  = ['', 'Weak', 'Fair', 'Good', 'Strong 💪'];
  bars.forEach((b, i) => {
    b.className = 'pw-bar';
    if (i < score) b.classList.add(score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong');
  });
  label.textContent = pw.length ? labels[score] : '';
  label.style.color = score <= 1 ? '#E05C5C' : score <= 2 ? '#E9A23B' : 'var(--green)';
}

// ── HELPERS ───────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('reg-error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('reg-success').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('reg-success');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('reg-error').style.display = 'none';
}
function setLoading(on) {
  const btn = document.getElementById('reg-btn');
  btn.disabled = on;
  document.getElementById('btn-spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-text').textContent = on ? 'Creating account…' : 'Create Account';
}

// ── REGISTER ──────────────────────────────────────────────
async function handleRegister() {
  document.getElementById('reg-error').style.display   = 'none';
  document.getElementById('reg-success').style.display = 'none';

  const name  = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const pw    = document.getElementById('password').value;
  const cpw   = document.getElementById('confirm-password').value;
  const terms = document.getElementById('terms').checked;

  // Validation
  if (!name || !email || !pw) {
    showError('Please fill in all required fields.'); return;
  }
  if (!/^\S+@\S+\.\S+$/.test(email)) {
    showError('Please enter a valid email address.'); return;
  }
  if (pw.length < 8) {
    showError('Password must be at least 8 characters.'); return;
  }
  if (pw !== cpw) {
    showError('Passwords do not match.'); return;
  }
  if (!terms) {
    showError('You must agree to the Terms & Conditions.'); return;
  }

  setLoading(true);

  const { data, error } = await db.auth.signUp({
    email,
    password: pw,
    options: {
      data: {
        full_name: name,
        phone:     phone || null,
        role:      currentRole,
      }
    }
  });

  setLoading(false);

  if (error) {
    if (error.message.includes('already registered')) {
      showError('An account with this email already exists. Try logging in.');
    } else {
      showError(error.message);
    }
    return;
  }

  // Check if email confirmation is required
  const needsConfirm = !data.session; // session is null when confirmation email is sent

  if (needsConfirm) {
    // Show success screen with email check message
    document.getElementById('reg-form').style.display     = 'none';
    document.getElementById('success-screen').style.display = 'block';
    document.getElementById('success-email').textContent  = email;
  } else {
    // Email confirmation disabled in Supabase → redirect immediately
    showSuccess('Account created! Redirecting…');
    setTimeout(() => {
      window.location.href = currentRole === 'employer'
        ? 'employer-dashboard.html'
        : 'post-profile.html';
    }, 1000);
  }
}
</script>
</body>
</html>
