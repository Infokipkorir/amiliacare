<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account – Amilia Care</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="logo">Amilia<span>Care</span></div>
    <h2>Create Your Account</h2>
    <p class="subtitle">Join thousands on Amilia Care</p>

    <div class="role-select">
      <div class="role-btn active" onclick="selectRole(this,'employee')" id="btn-employee">
        <span>👩‍💼</span>
        <p>I'm looking for work</p>
      </div>
      <div class="role-btn" onclick="selectRole(this,'employer')" id="btn-employer">
        <span>🏠</span>
        <p>I want to hire</p>
      </div>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="Jane Wanjiru Mwangi">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+254 7XX XXX XXX">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 8 characters">
      <div class="hint">Use a strong password with letters, numbers & symbols</div>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat your password">
    </div>

    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to the <a href="#" style="color:var(--green)">Terms & Conditions</a> and <a href="#" style="color:var(--green)">Privacy Policy</a></label>
      </div>
    </div>

    <div id="reg-error" style="display:none;background:#FCEBEB;border:1px solid #F09595;border-radius:8px;padding:10px 14px;font-size:13px;color:#A32D2D;margin-bottom:12px;"></div>

    <button class="btn-primary btn-full" onclick="handleRegister()">Create Account</button>

    <div class="auth-link" style="margin-top:1rem">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>

<script>
let currentRole = 'employee';
function selectRole(el, role) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentRole = role;
}
function handleRegister() {
  const name = document.getElementById('fullname').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const pw = document.getElementById('password').value;
  const cpw = document.getElementById('confirm-password').value;
  const terms = document.getElementById('terms').checked;
  const err = document.getElementById('reg-error');

  if (!name || !email || !phone || !pw) {
    err.style.display = 'block'; err.textContent = 'Please fill in all required fields.'; return;
  }
  if (pw.length < 8) {
    err.style.display = 'block'; err.textContent = 'Password must be at least 8 characters.'; return;
  }
  if (pw !== cpw) {
    err.style.display = 'block'; err.textContent = 'Passwords do not match.'; return;
  }
  if (!terms) {
    err.style.display = 'block'; err.textContent = 'You must agree to the Terms & Conditions.'; return;
  }
  err.style.display = 'none';

  if (currentRole === 'employee') {
    window.location.href = 'post-profile.html';
  } else {
    window.location.href = 'employer-dashboard.html';
  }
}
// Pre-fill role from URL param
const params = new URLSearchParams(window.location.search);
if (params.get('type') === 'employer') selectRole(document.getElementById('btn-employer'), 'employer');
</script>
</body>
</html>
